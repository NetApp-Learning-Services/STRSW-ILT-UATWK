apiVersion: protect.trident.netapp.io/v1
kind: AppMirrorRelationship
metadata:
  name: myredisapp-dst-amr
  namespace: myredisapp-dst
spec:
  desiredState: Established
  destinationAppVaultRef: c2-svmdst-s3-av
  namespaceMapping:
  - destination: myredisapp-dst
    source: myredisapp
  recurrenceRule: |-
    DTSTART:20220101T000200Z
    RRULE:FREQ=MINUTELY;INTERVAL=5
  sourceAppVaultRef: c1-svmsrc-s3-av
  sourceApplicationName: myredisapp
  sourceApplicationUID: change_me
  storageClassName: nfs-custom-sc